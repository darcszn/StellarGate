name: Supply-chain security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Every Monday at 09:00 UTC — surfaces newly-disclosed advisories
    # even when no code has changed.
    - cron: "0 9 * * 1"

jobs:
  audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Fails the job if any dependency has a known RustSec advisory.
      # --deny warnings escalates unmaintained/unsound advisories to errors.
      #
      # TEMPORARY IGNORE — RUSTSEC-2023-0071 (Marvin timing side-channel in
      # `rsa`). `rsa` is pulled in only via sqlx's unused MySQL backend (we
      # enable the `sqlite` feature only), so the vulnerable code is never
      # compiled. It is flagged because it still appears in Cargo.lock.
      #
      # This is a tracked, time-boxed exception, NOT a permanent waiver. Remove
      # the `--ignore` flag as soon as any removal condition is met:
      #   * a fixed `rsa` release ships, or
      #   * `rsa` leaves the dependency tree, or
      #   * we start enabling sqlx's MySQL backend (then it needs a real fix).
      # Review by: 2026-10-22 (quarterly). Tracking issue: StellarGateLabs#154.
      # Rationale + removal conditions are kept in sync in deny.toml.
      #
      # The weekly `schedule:` cron above re-runs this audit against a fresh
      # advisory DB, so a newly-published fix surfaces without a code change.
      - name: Run cargo audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071

  deny:
    name: cargo deny (licenses + advisories + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # deny.toml at repo root is picked up automatically.
          # Fail on advisories, license violations, and banned crates.
          command: check all
