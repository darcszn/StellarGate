# cargo-deny configuration for StellarGate
# Docs: https://embarkstudios.github.io/cargo-deny/

# ── Advisories ────────────────────────────────────────────────────────────────
# Mirrors the RustSec advisory database. cargo-deny fetches it automatically.
# Schema version 2: vulnerabilities, unsound and yanked crates are denied by
# default, so only the scope/ignore knobs need to be set explicitly.
[advisories]
version = 2
# Check every crate in the tree (not just the workspace) for unmaintained
# advisories — a supply-chain risk for a payments service.
unmaintained = "all"
# Advisories that are acknowledged and accepted, with justification.
ignore = [
    # RUSTSEC-2023-0071 (Marvin timing side-channel in `rsa`). `rsa` is pulled
    # in only via sqlx's MySQL backend, which we do not enable — we depend on
    # `sqlx` with the `sqlite` feature only, so the vulnerable code is never
    # compiled or executed. No fixed `rsa` release is available yet.
    "RUSTSEC-2023-0071",
]

# ── Licenses ──────────────────────────────────────────────────────────────────
# Schema version 2: any crate whose license is not in `allow` (or covered by an
# exception) is denied.
[licenses]
version = 2
# Skip the workspace's own unpublished crate (`publish = false`), which is
# intentionally unlicensed; only third-party dependencies are license-checked.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception", # compiler-builtins and related LLVM crates
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",                             # used by some cryptography crates (ring deps)
    "Unicode-DFS-2016",                # unicode-ident, icu_* and related crates
    "Unicode-3.0",                     # newer unicode-ident / icu_* releases
    "CC0-1.0",                         # public-domain data crates
    "Zlib",                            # miniz_oxide and compression crates
    "OpenSSL",                         # openssl-sys transitive dep via native-tls
]

# Crates that either bundle their own license text or use a non-SPDX
# expression that cargo-deny cannot auto-classify. Add with justification.
#
# ring uses a BoringSSL-derived license not expressible in SPDX; if it is
# pulled in transitively (e.g. via rustls), it is acceptable for a payments
# service. See https://github.com/briansmith/ring/blob/main/LICENSE
[[licenses.exceptions]]
allow = ["LicenseRef-ring"]
name = "ring"

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
# Warn when the same crate is resolved at multiple versions. Duplicates bloat
# the binary and can mask version-sensitive security fixes.
multiple-versions = "warn"
# Wildcard ("*") version requirements are allowed for now.
wildcards = "allow"

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
# Only crates.io is an allowed registry. Any git or path dependency that
# slips into Cargo.lock without being explicitly listed here will fail CI.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
